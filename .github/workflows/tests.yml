name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # Install CPU-only torch so the full test matrix runs quickly without
      # needing CUDA drivers.  All torch-dependent tests use TORCH_AVAILABLE
      # guards and will execute; GPU-specific code paths are skipped when no
      # CUDA device is present.
      - name: Install CPU-only torch
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package and dependencies
        run: |
          pip install -e ".[train]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --continue-on-collection-errors \
            -v \
            --tb=short \
            -p no:warnings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7
